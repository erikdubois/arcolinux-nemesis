# Application binddings
bindd = SUPER, RETURN, exec, alacritty
bindd = SUPER SHIFT, R, exec, hyprctl reload
bindd = SUPER, D, Launch apps, exec, walker -p "Start…"
bindd = SUPER SHIFT, D, Launch apps, exec, walker -p "Start…"
bindd = SUPER SHIFT, Q, killactive
bindd = SUPER SHIFT, RETURN, exec, thunar
bindd = SUPER SHIFT, Space, togglefloating
bindd = SUPER, E, exec, code
bindd = SUPER, F, fullscreen
bindd = SUPER, Q, killactive,
bindd = SUPER, R, exec, rofi-theme-selector
bindd = SUPER, T, exec, alacritty
bindd = SUPER, V, exec, pavucontrol

bindd = CTRL ALT, A, exec, xfce4-appfinder
bindd = CTRL ALT, B, exec, $files
bindd = CTRL ALT, C, exec, catfish
bindd = CTRL ALT, E, exec, archlinux-tweak-tool
bindd = CTRL ALT, F, exec, firefox
bindd = CTRL ALT, G, exec, chromium -no-default-browser-check
bindd = CTRL ALT, I, exec, nitrogen
bindd = CTRL ALT, P, exec, pamac-manager
bindd = CTRL ALT, R, exec, rofi-theme-selector
bindd = CTRL ALT, RETURN, exec, alacritty
bindd = CTRL ALT, S, exec, spotify
bindd = CTRL ALT, T, exec, alacritty
bindd = CTRL ALT, U, exec, pavucontrol
bindd = CTRL ALT, V, exec, vivaldi-stable
bindd = CTRL ALT, W, exec, arcolinux-welcome-app
bindd = CTRL ALT, END, exec, alacritty --class btop -T btop -e btop

bindd = CTRL SHIFT, Escape, exec, alacritty --class btop -T btop -e btop

# Variety
# trash wallpaper
bindd = ALT, t, exec, variety -t
# next wallpaper
bindd = ALT, n, exec, variety -n
bindd = ALT SHIFT, n, exec, variety -n && wal -i $(cat $HOME/.config/variety/wallpaper/wallpaper.jpg.txt) && ~/.config/hypr/scripts/statusbar &
bindd = ALT, right, exec, variety -n
# previous wallpaper
bindd = ALT, p, exec, variety -p
bindd = ALT SHIFT, p, exec, variety -p && wal -i $(cat $HOME/.config/variety/wallpaper/wallpaper.jpg.txt) && ~/.config/hypr/scripts/statusbar &
bindd = ALT, left, exec, variety -p
# favorite wallpaper
bindd = ALT, f, exec, variety -f
# pause wallpaper
bindd = ALT, up, exec, variety --toggle-pause
# pause wallpaper + wal
bindd = ALT SHIFT, up, exec, variety --toggle-pause && wal -i $(cat $HOME/.config/variety/wallpaper/wallpaper.jpg.txt) && ~/.config/hypr/scripts/statusbar &
# resume wallpaper
bindd = ALT, down, exec, variety --resume
bindd = ALT, F3, exec, xfce4-appfinder
bindd = , F12, exec, xfce4-terminal --drop-down

bindd = SUPER, Escape, exec, hyprctl kill
bindd = SUPER, X, exec, archlinux-logout
bindd = ALT, X, exec, nlogout
bindd = ALT SHIFT, X, exec, nlogout
bindd = SUPER SHIFT, X, exec, arcolinux-powermenu

# Mainmod + Function keys
bindd = SUPER, F1, exec, firefox
bindd = SUPER, F2, exec, code
bindd = SUPER, F3, exec, inkscape
bindd = SUPER, F4, exec, gimp
bindd = SUPER, F5, exec, meld
bindd = SUPER, F6, exec, vlc
bindd = SUPER, F7, exec, virtualbox
bindd = SUPER, F8, exec, thunar
bindd = SUPER, F9, exec, lollypop
bindd = SUPER, F10, exec, spotify
bindd = SUPER, F11, exec, rofi -show drun
bindd = SUPER, F12, exec, rofi -show drun



<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page not found &mdash; ArcoLinux Nemesis</title>
    <meta name="description" content="That page could not be found." />
    <meta name="theme-color" content="#0f172a" />
    <meta name="robots" content="noindex" />
    <link rel="icon" href="assets/branding/logo.png" />
    <link rel="apple-touch-icon" href="assets/branding/logo.png" />
    <link rel="stylesheet" href="dist/tailwind.css" />
    <script>
      window.DEFAULT_ACCENT = 'sky';
      window.PALETTES = {
        sky:     { 200: '186 230 253', 300: '125 211 252', 400: '56 189 248',  500: '14 165 233' },
        gold:    { 200: '253 230 138', 300: '252 211 77',  400: '251 191 36',  500: '245 158 11' },
        emerald: { 200: '167 243 208', 300: '110 231 183', 400: '52 211 153',  500: '16 185 129' },
        violet:  { 200: '221 214 254', 300: '196 181 253', 400: '167 139 250', 500: '139 92 246' },
        rose:    { 200: '254 205 211', 300: '253 164 175', 400: '251 113 133', 500: '244 63 94'  },
      };
      (function () {
        function apply(n) { var p = window.PALETTES[n]; if (!p) return; for (var k in p) document.documentElement.style.setProperty('--accent-' + k, p[k]); }
        var s = null; try { s = localStorage.getItem('nemesis-accent'); } catch (e) {}
        apply(s && window.PALETTES[s] ? s : window.DEFAULT_ACCENT);
      })();
    </script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="flex min-h-screen flex-col bg-slate-950 text-slate-100 antialiased">
    <main class="relative flex flex-1 items-center justify-center overflow-hidden px-6 py-24 text-center">
      <div class="pointer-events-none absolute inset-0 -z-10 bg-[radial-gradient(ellipse_at_top,_rgb(var(--accent-400)/0.15),_transparent_60%)]"></div>
      <div class="max-w-lg">
        <img src="assets/branding/logo.png" alt="" class="mx-auto h-14 w-14 object-contain" width="56" height="56" />
        <p class="mt-6 text-6xl font-bold tracking-tight text-accent-400">404</p>
        <h1 class="mt-4 text-2xl font-bold tracking-tight sm:text-3xl">Page not found</h1>
        <p class="mt-3 text-slate-400">The page you were after doesn&rsquo;t exist or moved. Let&rsquo;s get you back on track.</p>
        <div class="mt-8 flex flex-col items-center justify-center gap-3 sm:flex-row">
          <a href="index.html" class="inline-flex items-center gap-2 rounded-lg bg-accent-500 px-6 py-3 font-semibold text-white hover:bg-accent-400">Back home</a>
          <a href="learn.html" class="inline-flex items-center gap-2 rounded-lg border border-slate-700 px-6 py-3 font-semibold text-slate-200 hover:border-slate-600 hover:bg-slate-900">Learning hub</a>
        </div>
      </div>
    </main>
  </body>
</html>

# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  Kiro wayfire — hypridle (idle → lock → screen-off)                        ║
# ╚══════════════════════════════════════════════════════════════════════════╝
#
# hypridle listens on the ext-idle-notify protocol (which wayfire implements) and
# runs the lock/dpms actions below. The locker is hyprlock — same Wayland lock
# pipeline as kiro-hyprland, fed by the betterlockscreen blur cache (Ctrl+Alt+R).

general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = wlr-randr --output '*' --on
}

listener {
    timeout = 300                      # 5 min  → lock
    on-timeout = loginctl lock-session
}

listener {
    timeout = 360                      # 6 min  → screen off
    on-timeout = wlr-randr --output '*' --off
    on-resume = wlr-randr --output '*' --on
}

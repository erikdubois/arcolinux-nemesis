# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  Kiro Hyprland — hyprlock (Wayland lock screen)                            ║
# ╚══════════════════════════════════════════════════════════════════════════╝
#
# Wayland counterpart to betterlockscreen/i3lock (which are X11-only). The lock
# background is the blurred image cached by `betterlockscreen -u`: open
# archlinux-betterlockscreen (Ctrl + Alt + R), pick a wallpaper and Apply — the
# blurred result lands at the path below and shows here on the next lock.
#
# hyprlock does NOT expand "~", so the path is spelled with $HOME. Until the
# cache exists, hyprlock falls back to the solid color in the background block —
# the screen still locks, it just has no wallpaper yet.

general {
    hide_cursor = true
    grace = 0
    ignore_empty_input = true
}

background {
    monitor =
    path = $HOME/.cache/betterlockscreen/current/lock_dimblur.png
    color = rgba(25, 25, 35, 1.0)
    # betterlockscreen already pre-blurred the image; no extra GPU blur needed.
    blur_passes = 0
}

# ── Clock ────────────────────────────────────────────────────────────────────
label {
    monitor =
    text = $TIME
    font_size = 90
    font_family = JetBrainsMono Nerd Font
    color = rgba(235, 235, 235, 1.0)
    position = 0, 180
    halign = center
    valign = center
}

# ── Date ─────────────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    color = rgba(200, 200, 200, 1.0)
    position = 0, 90
    halign = center
    valign = center
}

# ── Greeting ─────────────────────────────────────────────────────────────────
label {
    monitor =
    text = Hi $USER
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    color = rgba(200, 200, 200, 1.0)
    position = 0, -55
    halign = center
    valign = center
}

# ── Password input ───────────────────────────────────────────────────────────
input-field {
    monitor =
    size = 320, 55
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(120, 130, 160, 1.0)
    inner_color = rgba(35, 35, 45, 0.9)
    font_color = rgba(235, 235, 235, 1.0)
    fade_on_empty = true
    placeholder_text = <i>Password…</i>
    fail_text = <i>Wrong — try again ($ATTEMPTS)</i>
    position = 0, -120
    halign = center
    valign = center
}

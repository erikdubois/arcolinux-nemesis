# ============================================================================
# Kiro-ISO System Optimization - Sysctl Parameters
# ============================================================================
# These optimizations enhance system responsiveness and performance
# while maintaining stability across various hardware configurations

# ============================================================================
# Memory Management - Balances RAM usage with swap and cache
# ============================================================================

# Aggressive swap usage (100) = swap and cache treated equally
# This is ideal for systems where responsiveness matters more than swap avoidance
vm.swappiness = 100

# Reduce inode/dentry cache reclamation pressure
# Lower value = keep more cache in memory
# Good for systems with adequate RAM
vm.vfs_cache_pressure = 50

# Dirty page thresholds - when to start writing to disk
# 256MB threshold for dirty pages
vm.dirty_bytes = 268435456

# Background flushing starts at 64MB of dirty data
vm.dirty_background_bytes = 67108864

# How often to flush dirty data to disk (15 seconds)
# More aggressive flushing = more responsive system
vm.dirty_writeback_centisecs = 1500

# Page cluster setting for swap
# 0 = read single pages (best for SSD/ZRAM)
# 1-2 = read clusters (better for physical HDD swap)
vm.page-cluster = 0

# ============================================================================
# Kernel Performance
# ============================================================================

# Disable NMI watchdog for better performance
# NMI watchdog is rarely needed on modern systems
kernel.nmi_watchdog = 0

# Allow unprivileged user namespace cloning
# Essential for containers and modern applications
kernel.unprivileged_userns_clone = 1

# Suppress kernel messages from console
# Cleaner boot and less noise
kernel.printk = 3 3 3 3

# Restrict kernel pointer visibility for security
kernel.kptr_restrict = 2

# ============================================================================
# Networking - Better packet handling
# ============================================================================

# Increase network device backlog queue
# Prevents packet loss under high traffic
net.core.netdev_max_backlog = 4096

# ============================================================================
# File System
# ============================================================================

# Increase maximum file descriptors
# Essential for modern applications
fs.file-max = 2097152

# Maximum number of memory map areas a process can have
# Very high value allows applications with many memory maps to function properly
# Common needed for development tools, databases, and large applications
vm.max_map_count = 2147483642

# File watchers (for development tools)
# Allows development tools to monitor more files simultaneously
fs.inotify.max_user_watches = 524288

# ============================================================================
# Optional: Additional optimizations for keyboard-driven workflow
# ============================================================================

# Reduce context switching overhead
# Lower values = less frequent context switch cost calculations
# Useful for latency-sensitive applications
# kernel.sched_migration_cost_ns = 5000000

# Improve disk I/O responsiveness by disabling zone reclaim
# Set to 0: disabled (recommended for most systems)
# Set to 1: enabled (for NUMA systems with multiple zones)
# vm.zone_reclaim_mode = 0

# ============================================================================
# Kernel Hardening & Security Parameters
# ============================================================================
# Based on 930-real-metal.sh security profile
# Enhances system security while maintaining usability

# Restrict SysRq kernel command key access
# Prevents unauthorized users from triggering dangerous kernel functions
kernel.sysrq = 0

# Restrict kernel pointer visibility in /proc
# Prevents information leakage about kernel memory layout
# Value 2 = restrict to CAP_SYS_ADMIN (admin only)
kernel.kptr_restrict = 2

# Restrict access to dmesg kernel log buffer
# Prevents unprivileged users from reading sensitive kernel messages
kernel.dmesg_restrict = 1

# Restrict ptrace scope for user processes
# Value 2 = only parents can trace (prevents unauthorized debugging)
kernel.yama.ptrace_scope = 2

# Disable unprivileged BPF (Berkeley Packet Filter) operations
# Prevents unprivileged users from loading BPF programs
# Important for kernel security hardening
kernel.unprivileged_bpf_disabled = 1

# Restrict performance event counter access
# Value 3 = restrict perf to CAP_SYS_ADMIN (admin only)
# Prevents unprivileged users from profiling the kernel
kernel.perf_event_paranoid = 3

# ============================================================================
# Core Dump Restrictions
# ============================================================================

# Append process ID to core dump filenames
# Makes core dumps unique per process, preventing overwrites
kernel.core_uses_pid = 1

# Disable core dumps for SUID/SGID binaries
# Value 0 = core dumps disabled (more secure)
# Prevents leaking sensitive information through core dumps
fs.suid_dumpable = 0

# Redirect core dump operations to /bin/false (disable them completely)
# Prevents any core dump generation at all
# Useful for production systems where core dumps are not needed
kernel.core_pattern = |/bin/false

# ============================================================================
# Network Performance Optimization for Responsiveness
# ============================================================================
# These settings reduce latency, prevent bufferbloat, and improve interactive
# performance for desktop and laptop systems. Settings are conservative but
# effective for typical Arch Linux users.

# ============================================================================
# TCP Congestion Control - BBR for Low Latency
# ============================================================================

# Use BBR (Bottleneck Bandwidth and Round-trip) congestion control
# BBR is a modern algorithm from Google that:
#   - Achieves higher bandwidth and lower latency than legacy algorithms
#   - Works better on lossy networks (WiFi, mobile)
#   - Reduces "bufferbloat" (excessive latency variation)
# Alternative: reno (legacy, simple), cubic (common server default)
net.ipv4.tcp_congestion_control = bbr

# Allow BBR to use TCP Fast Open
# Reduces latency by allowing data in SYN packet
net.ipv4.tcp_fastopen = 3

# Increase TCP backlog for establishing connections
# Prevents connection timeouts under heavy load
net.ipv4.tcp_max_syn_backlog = 8096

# ============================================================================
# Output Queuing Discipline (QDisc) - Reduce Bufferbloat
# ============================================================================

# Use fq (Fair Queuing) for optimal latency and responsiveness
# Benefits over fq_codel:
#   - Simpler algorithm, lower CPU overhead
#   - Fair queuing ensures no single flow dominates
#   - Excellent for interactive workloads (gaming, audio, video calls)
#   - Better performance than default fq_codel in most scenarios
#   - Recommended by modern optimization suites (CachyOS, etc)
# Alternative defaults: fq_codel (system default), pfifo_fast (legacy)
net.core.default_qdisc = fq

# ============================================================================
# Packet Processing - Reduce Processing Latency
# ============================================================================

# Maximum microseconds to spend in a single NAPI poll cycle
# Lower value = more responsive, higher value = better throughput
# Desktop/interactive: 2000 (2ms) - very responsive
# Server/throughput:   4000 (4ms) - balanced
# Older hardware:      1000 (1ms) - safe conservative value
net.core.netdev_budget_usecs = 2000

# Maximum packets processed in a single NAPI poll cycle
# Related to budget_usecs, works in conjunction
# Desktop: 300 packets
# Server:  600 packets
net.core.netdev_budget = 300

# Maximum input queue size before dropping packets
# Prevents packet loss under traffic spikes
# Increased from default 1000 to 5000 for better handling
net.core.netdev_max_backlog = 5000

# Per-CPU limit on packets during NAPI processing
# Lower value = faster processing, higher latency if too low
net.core.dev_weight = 64

# ============================================================================
# TCP Buffer Tuning - Balance Memory and Performance
# ============================================================================

# TCP receive buffer sizes (min, default, max) in bytes
# Default: 4096 87380 6291456 (6MB max - too small for modern networks)
# Our setting:
#   min:     4096 bytes (4KB) - minimum for any TCP connection
#   default: 87380 bytes (~85KB) - typical connection size
#   max:     536870912 bytes (512MB) - supports large file transfers
# BBR handles buffering well, so large max is safe
net.ipv4.tcp_rmem = 4096 87380 536870912

# TCP send buffer sizes (min, default, max) in bytes
# Similar to rmem but for transmission
# Allows efficient bulk transfers without excessive memory
net.ipv4.tcp_wmem = 4096 65536 536870912

# Automatic receive buffer tuning
# Kernel dynamically adjusts buffers based on actual network conditions
# Recommended: enabled (1) for adaptive behavior
net.ipv4.tcp_moderate_rcvbuf = 1

# ============================================================================
# TCP Behavior Optimization
# ============================================================================

# Minimum data not yet sent to socket before considering send
# Lower value = more responsive interactive applications
# 16384 bytes = good balance between latency and efficiency
net.ipv4.tcp_notsent_lowat = 16384

# Enable TCP window scaling
# Allows windows larger than 64KB for high-bandwidth connections
net.ipv4.tcp_window_scaling = 1

# Enable SYN cookies for DoS protection
# Protects against SYN floods while maintaining compatibility
net.ipv4.tcp_syncookies = 1

# Enable TCP Fast Open
# Reduces handshake latency for repeat connections
net.ipv4.tcp_fastopen = 3

# Reuse TIME_WAIT connections faster
# Speeds up reconnection to same remote address:port
# Safe for modern systems (RFC 1323 compliant)
net.ipv4.tcp_tw_reuse = 1

# Network optimization - MTU probing
# Enables path MTU discovery for better performance on varied networks
net.ipv4.tcp_mtu_probing = 1

# ============================================================================
# Connection Handling
# ============================================================================

# Listen queue backlog limit
# How many connections can wait before being accepted
# Default 128 is often too low for modern services
net.core.somaxconn = 4096

# Maximum TCP connections in TIME_WAIT state
# Increased from default 32768 to prevent connection drops
net.ipv4.tcp_max_tw_buckets = 2000000

# ============================================================================
# Network Device Tuning
# ============================================================================

# Increase the socket read buffer for all protocols
# Benefits applications that read large amounts of data
net.core.rmem_default = 262144
net.core.rmem_max = 536870912

# Increase the socket send buffer for all protocols
net.core.wmem_default = 262144
net.core.wmem_max = 536870912

# ============================================================================
# IPv4 Networking Security & Robustness
# ============================================================================

# Disable sending of ICMP redirects
# Prevents potential security issues, rarely needed
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Disable IP forwarding (unless router)
# Not needed for desktop/laptop systems
net.ipv4.ip_forward = 0

# ============================================================================
# Optional: Advanced Optimizations
# ============================================================================

# TCP keepalive settings - for long-lived connections
# tcp_keepalive_time: seconds before sending keepalive probe (default: 7200)
# net.ipv4.tcp_keepalive_time = 300

# Reduce TCP FIN timeout (connections in FIN_WAIT state)
# Default 60, reduce to 30 for faster connection cleanup
# net.ipv4.tcp_fin_timeout = 30

# Increase retransmit attempts for lossy networks (WiFi)
# Default 15, useful for unstable connections
# net.ipv4.tcp_retries2 = 15

# Enable TCP timestamps for more accurate RTT measurement
# Slightly increases TCP header overhead but improves reliability
# net.ipv4.tcp_timestamps = 1

# ============================================================================
# TCP Congestion Control - BBR for Low Latency & Better Throughput
# ============================================================================
# BBR (Bottleneck Bandwidth and RTT) provides better performance than cubic
# Especially good for:
#   - Gaming (low latency)
#   - Streaming (high throughput)
#   - WiFi connections (variable latency relief)
#
# Requires: kernel >= 4.13 (widely available)

# Use BBR as the default TCP congestion control algorithm
# This replaces CUBIC on most modern systems
net.ipv4.tcp_congestion_control = bbr

# Set default packet queuing discipline to fq (Fair Queuing)
# Benefits:
#   - Per-flow fairness (one slow connection doesn't block others)
#   - Anti-bufferbloat (reduces queue buildup)
#   - Low latency for interactive traffic
# Works best with BBR for comprehensive latency reduction
net.core.default_qdisc = fq

# fq scheduler parameters
# Quantum: amount of bytes sent before switching flows
# Default 3000, increase for gigabit networks
# net.ipv4.fsmt_quantum = 3000

# Maximum buffering for Fair Queuing
# Default 25MB, reduce for lower latency on memory-constrained systems
# net.ipv4.fq_flow_max_rate = 0  # 0 = unlimited

# ============================================================================
# UDP Buffer Management
# ============================================================================
# Increase UDP buffer sizes for multimedia and gaming

# UDP receive buffer sizes (min, default, max) in bytes
# Helps with burst network traffic (streaming, gaming)
net.ipv4.udp_mem = 102400 178956 205824

# ============================================================================
# TCP FIN_WAIT Handling
# ============================================================================
# Speed up connection cleanup for rapid reconnections

# Timeout for connections in FIN_WAIT state
# Allows reusing TIME_WAIT slots faster for new connections
# Safe with tcp_tw_reuse=1
net.ipv4.tcp_fin_timeout = 20

# ============================================================================
# Advanced Swap & Memory Pressure Tuning
# ============================================================================
# Imported from EndeavourOS standards for improved stability

# Watermark scale - trigger memory reclaim earlier
# Higher value = aggressive memory management
# Helps prevent sudden memory pressure spikes
vm.watermark_scale_factor = 200

# External fragmentation threshold (0-1000)
# Lower value = more aggressive defragmentation
# Prevents memory fragmentation under load
vm.extfrag_threshold = 500

# Minimum free memory (in KB) reserved for kernel
# Prevents kernel allocation failures
# 256MB reserve on most systems
vm.min_free_kbytes = 262144

# Dirty page ratio before forcing synchronous write
# 10% = aggressive write-back for responsiveness
vm.dirty_ratio = 10

# Background dirty ratio (when pdflush wakes up)
# 3% = triggers writeout earlier
vm.dirty_background_ratio = 3

# How long dirty pages can stay in memory (centiseconds)
# 1500 = 15 seconds (balance between latency and throughput)
vm.dirty_expire_centisecs = 1500

# ============================================================================
# OOM Daemon Integration  
# ============================================================================
# Systemd-oomd settings for graceful memory handling (since systemd 248)

# Kernel should not panic on OOM (userspace handles it)
vm.panic_on_oom = 0

# Don't dump task info on OOM (reduces noise)
vm.oom_dump_tasks = 0

# Overcommit memory policy
# 1 = allow overcommit (required for ZRAM + swap)
# 0 = conservative (may fail allocations unnecessarily)
vm.overcommit_memory = 1

# Overcommit ratio when overcommit_memory = 1
# 50% = allow up to 50% of swap + physical RAM commitments
vm.overcommit_ratio = 50

# ============================================================================
# CPU Scheduler Tuning for Audio/Interactive Workloads
# ============================================================================
# Imported from pro-audio and desktop optimization standards

# Scheduler latency target (ns) - max time waiting for CPU
# 24ms = good for interactive work, audio production
# Note: Not supported on this kernel
# kernel.sched_latency_ns = 24000000

# Minimum time slice per process (ns)
# 4ms = fine-grained scheduling for interactive response
# Note: Not supported on this kernel
# kernel.sched_min_granularity_ns = 4000000

# Target time spent on wake-up (ns)
# Affects how quickly sleeping processes get CPU
# Note: Not supported on this kernel
# kernel.sched_wakeup_granularity_ns = 2000000

# Disable automatic group scheduling
# Can interfere with audio priority management
kernel.sched_autogroup_enabled = 0

# Realtime scheduling runtime percentage  
# 95% = allow realtime tasks to use 95% of CPU per period
kernel.sched_rt_runtime_us = 950000

# Realtime scheduling period (microseconds)
# 1,000,000 = 1 second period
kernel.sched_rt_period_us = 1000000

# ============================================================================
# Network Connection Stability
# ============================================================================
# Imported from EndeavourOS for improved server/connection stability

# TCP orphan retries (connections with no user)
# 2 = quickly clean up orphaned connections
net.ipv4.tcp_orphan_retries = 2

# TCP keepalive probes interval (seconds)
# Better default for long-lived connections
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_probes = 3
net.ipv4.tcp_keepalive_intvl = 15

# IPv6 temporary addresses (privacy)
# 2 = use temporary addresses and prefer them
net.ipv6.conf.all.use_tempaddr = 2
net.ipv6.conf.default.use_tempaddr = 2

# ============================================================================
# Panic & Recovery Settings
# ============================================================================
# Improve system stability and recovery

# Panic delay (seconds) - time before automatic reboot on panic
# 10 seconds allows capturing error info
kernel.panic = 10

# Panic with RCU stall (kernel synchronization)
# 30 seconds - don't panic on RCU stall
# Note: Not supported on this kernel
# kernel.rcu_cpu_stall_timeout = 30

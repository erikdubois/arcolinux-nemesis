# Nsswitch.conf from nemesis

# Name Service Switch configuration file.
# See nsswitch.conf(5) for details.
# we changed nsswitch.conf to have access to nas servers
# This config file comes from the erikdubois github - arcolinux nemesis
# https://raw.githubusercontent.com/erikdubois/arcolinux-nemesis/refs/heads/master/Personal/settings/nsswitch/nsswitch.conf

passwd: files systemd
group: files [SUCCESS=merge] systemd
shadow: files systemd
gshadow: files systemd

publickey: files

hosts: files mymachines mdns_minimal [NOTFOUND=return] resolve dns wins myhostname
networks: files

protocols: files
services: files
ethers: files
rpc: files

netgroup: files

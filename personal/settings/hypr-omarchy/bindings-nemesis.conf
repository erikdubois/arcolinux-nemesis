# Application binddings
bindd = SUPER, RETURN, Terminal, exec, alacritty
bindd = SUPER SHIFT, R, Reload Hyprland, exec, hyprctl reload
bindd = SUPER, D, Launch apps, exec, walker -p "Start…"
bindd = SUPER SHIFT, D, Launch apps, exec, walker -p "Start…"
bindd = SUPER SHIFT, Q, Close window, killactive
bindd = SUPER SHIFT, RETURN, File manager, exec, thunar
bindd = SUPER SHIFT, Space, Toggle floating, togglefloating
bindd = SUPER, E, Code editor, exec, code
bindd = SUPER, F, Full width, fullscreen, 1
bindd = SUPER, F, Full screen, fullscreen, 0
bindd = SUPER CTRL, F, Tiled full screen, fullscreenstate, 0 2
bindd = SUPER ALT, F, Full width, fullscreen, 1
bindd = SUPER, Q, Close window, killactive
bindd = SUPER, R, Theme selector, exec, rofi-theme-selector
bindd = SUPER, T, Terminal, exec, alacritty
bindd = SUPER, V, Volume control, exec, pavucontrol

bindd = CTRL ALT, A, App finder, exec, xfce4-appfinder
bindd = CTRL ALT, B, Files menu, exec, $files
bindd = CTRL ALT, C, File search, exec, catfish
bindd = CTRL ALT, E, Tweak tool, exec, archlinux-tweak-tool
bindd = CTRL ALT, F, Firefox, exec, firefox
bindd = CTRL ALT, G, Chromium, exec, chromium -no-default-browser-check
bindd = CTRL ALT, I, Nitrogen, exec, nitrogen
bindd = CTRL ALT, P, Package manager, exec, pamac-manager
bindd = CTRL ALT, R, Theme selector, exec, rofi-theme-selector
bindd = CTRL ALT, RETURN, Terminal, exec, alacritty
bindd = CTRL ALT, S, Spotify, exec, spotify
bindd = CTRL ALT, T, Terminal, exec, alacritty
bindd = CTRL ALT, U, Volume control, exec, pavucontrol
bindd = CTRL ALT, V, Vivaldi, exec, vivaldi-stable
bindd = CTRL ALT, W, Welcome app, exec, arcolinux-welcome-app
bindd = CTRL ALT, END, System monitor, exec, alacritty --class btop -T btop -e btop

bindd = CTRL SHIFT, Escape, System monitor, exec, alacritty --class btop -T btop -e btop

# Variety
# trash wallpaper
bindd = ALT, t, Trash wallpaper, exec, variety -t
# next wallpaper
bindd = ALT, n, Next wallpaper, exec, variety -n
bindd = ALT SHIFT, n, Next wallpaper with wal, exec, variety -n && wal -i $(cat $HOME/.config/variety/wallpaper/wallpaper.jpg.txt) && ~/.config/hypr/scripts/statusbar &
bindd = ALT, right, Next wallpaper, exec, variety -n
# previous wallpaper
bindd = ALT, p, Previous wallpaper, exec, variety -p
bindd = ALT SHIFT, p, Previous wallpaper with wal, exec, variety -p && wal -i $(cat $HOME/.config/variety/wallpaper/wallpaper.jpg.txt) && ~/.config/hypr/scripts/statusbar &
bindd = ALT, left, Previous wallpaper, exec, variety -p
# favorite wallpaper
bindd = ALT, f, Favorite wallpaper, exec, variety -f
# pause wallpaper
bindd = ALT, up, Toggle wallpaper pause, exec, variety --toggle-pause
# pause wallpaper + wal
bindd = ALT SHIFT, up, Toggle wallpaper pause with wal, exec, variety --toggle-pause && wal -i $(cat $HOME/.config/variety/wallpaper/wallpaper.jpg.txt) && ~/.config/hypr/scripts/statusbar &
# resume wallpaper
bindd = ALT, down, Resume wallpaper, exec, variety --resume
bindd = ALT, F3, App finder, exec, xfce4-appfinder
bindd = , F12, Dropdown terminal, exec, xfce4-terminal --drop-down

bindd = SUPER, Escape, Kill mode, exec, hyprctl kill
bindd = SUPER, X, Logout menu, exec, archlinux-logout
bindd = ALT, X, Logout menu, exec, nlogout
bindd = ALT SHIFT, X, Logout menu, exec, nlogout
bindd = SUPER SHIFT, X, Power menu, exec, arcolinux-powermenu

# Mainmod + Function keys
bindd = SUPER, F1, Firefox, exec, firefox
bindd = SUPER, F2, Code editor, exec, code
bindd = SUPER, F3, Inkscape, exec, inkscape
bindd = SUPER, F4, GIMP, exec, gimp
bindd = SUPER, F5, Meld, exec, meld
bindd = SUPER, F6, VLC, exec, vlc
bindd = SUPER, F7, VirtualBox, exec, virtualbox
bindd = SUPER, F8, File manager, exec, thunar
bindd = SUPER, F9, Lollypop, exec, lollypop
bindd = SUPER, F10, Spotify, exec, spotify
bindd = SUPER, F11, Rofi drun, exec, rofi -show drun
bindd = SUPER, F12, Rofi drun, exec, rofi -show drun


